name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-tests:
    name: Portable tests / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux amd64
            runner: ubuntu-24.04
          - platform: Linux arm64
            runner: ubuntu-24.04-arm
          - platform: Windows amd64
            runner: windows-2025
          - platform: Windows arm64
            runner: windows-11-arm
          - platform: macOS arm64
            runner: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build-tests
          -DKISAK_BUILD_MP=OFF
          -DKISAK_BUILD_DEDICATED=OFF
          -DKISAK_BUILD_SP=OFF
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON

      - name: Build portable tests
        run: cmake --build build-tests --config Release --parallel

      - name: Run portable tests
        run: ctest --test-dir build-tests -C Release --output-on-failure

  windows-x86:
    name: Windows x86 / ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      DXSDK_VERSION: 9.29.952.8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore DirectX SDK
        shell: pwsh
        run: |
          dotnet new classlib -o dxsdk-temp
          dotnet add dxsdk-temp package Microsoft.DXSDK.D3DX --version $env:DXSDK_VERSION
          $native = Join-Path $env:NUGET_PACKAGES "microsoft.dxsdk.d3dx\$env:DXSDK_VERSION\build\native"
          "DXSDK_NATIVE=$native" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B "build-${{ matrix.config }}" `
            -G "Visual Studio 17 2022" -A Win32 `
            -DCICD=ON "-DDXSDK_DIR=$env:DXSDK_NATIVE" `
            -DKISAK_BUILD_MP=ON `
            -DKISAK_BUILD_DEDICATED=ON `
            -DKISAK_BUILD_SP=OFF `
            -DKISAK_MEASURE_FX_ARCHIVE_STACK=ON

      - name: Build
        shell: pwsh
        run: >
          cmake --build "build-${{ matrix.config }}"
          --config "${{ matrix.config }}"
          --target KisakCOD-mp KisakCOD-dedi
          kisakcod-pool-allocator-tests
          kisakcod-fx-effect-table-restore-tests
          kisakcod-fx-effect-table-save-tests
          kisakcod-fx-archive-disk32-tests
          kisakcod-fx-archive-system-disk32-tests
          --parallel

      - name: Enforce FX archive stack budgets
        shell: pwsh
        run: >
          ./scripts/ci/check-fx-archive-stack.ps1
          -InputPath
          "build-${{ matrix.config }}/scripts/mp/fx_archive_stack_${{ matrix.config }}.xml"

      - name: Run portable transaction tests
        shell: pwsh
        run: >
          ctest --test-dir "build-${{ matrix.config }}"
          -C "${{ matrix.config }}" --output-on-failure
          -R "^(pool-native-pointer-freelist|effectscore-effect-table-(transactional-restore|bounded-save)|effectscore-archive-(disk32|system-disk32)-codec)$"

      - uses: actions/upload-artifact@v4
        with:
          name: KisakCOD-windows-x86-${{ matrix.config }}
          path: bin/${{ matrix.config }}/
          if-no-files-found: error
          retention-days: 14

  windows-x86-nosteam:
    # Compile-checks the KISAK_ENABLE_STEAM=OFF fallback path (cl_guid identity,
    # sv_requireSteam, empty win_steam.cpp TU). Windows x86 is the only target that can
    # build the engine today, so it stands in for the ARM/no-Steam configuration until
    # the POSIX/Vulkan platform layers land. Compile only; no artifact.
    name: Windows x86 (no Steam)
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      DXSDK_VERSION: 9.29.952.8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore DirectX SDK
        shell: pwsh
        run: |
          dotnet new classlib -o dxsdk-temp
          dotnet add dxsdk-temp package Microsoft.DXSDK.D3DX --version $env:DXSDK_VERSION
          $native = Join-Path $env:NUGET_PACKAGES "microsoft.dxsdk.d3dx\$env:DXSDK_VERSION\build\native"
          "DXSDK_NATIVE=$native" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-nosteam `
            -G "Visual Studio 17 2022" -A Win32 `
            -DCICD=ON "-DDXSDK_DIR=$env:DXSDK_NATIVE" `
            -DKISAK_BUILD_MP=ON `
            -DKISAK_BUILD_DEDICATED=ON `
            -DKISAK_BUILD_SP=OFF `
            -DKISAK_ENABLE_STEAM=OFF

      - name: Build
        shell: pwsh
        run: >
          cmake --build build-nosteam
          --config Release
          --target KisakCOD-mp KisakCOD-dedi
          --parallel

  windows-x86-headless:
    # This is the first real compile/link gate for the portable dedicated-server
    # source profile. Keep it independent of the legacy Windows client/media
    # build so headless cannot silently regain DirectX, Miles, Bink, or Steam.
    name: Windows x86 (headless dedicated)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-headless `
            -G "Visual Studio 17 2022" -A Win32 `
            -DKISAK_BUILD_MP=OFF `
            -DKISAK_BUILD_DEDICATED=ON `
            -DKISAK_BUILD_SP=OFF `
            -DKISAK_DEDI_HEADLESS=ON `
            -DKISAK_ENABLE_STEAM=OFF `
            -DKISAK_ENABLE_X86_MMX_SKINNING=OFF `
            -DBUILD_TESTING=OFF

      - name: Build
        shell: pwsh
        run: >
          cmake --build build-headless
          --config Release
          --target KisakCOD-dedi
          --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: KisakCOD-windows-x86-headless-Release
          path: bin/Release/KisakCOD-dedi.exe
          if-no-files-found: error
          retention-days: 14
