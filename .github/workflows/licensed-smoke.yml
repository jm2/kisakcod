name: Licensed gameplay smoke

# This workflow is manual and protected because it executes repository code on
# a self-hosted runner that has licensed COD4 data.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Trusted branch or v* tag to test
        required: true
        default: master

permissions:
  contents: read

jobs:
  windows-x86:
    environment: licensed-game-data
    runs-on: [self-hosted, kisakcod, windows, x86]
    steps:
      - name: Validate trusted ref
        shell: pwsh
        run: |
          if ('${{ inputs.ref }}' -ne 'master' -and '${{ inputs.ref }}' -notmatch '^v[0-9]') {
            throw 'Licensed runners only accept master or version tags.'
          }

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Build dedicated server
        shell: pwsh
        run: ./build-win.ps1 -Config Release -Targets KisakCOD-dedi -Clean

      - name: Start server and query getstatus
        shell: pwsh
        env:
          KISAKCOD_GAME_DIR: ${{ secrets.KISAKCOD_GAME_DIR }}
        run: ./scripts/ci/smoke-dedicated.ps1 -Executable ./bin/Release/KisakCOD-dedi.exe
