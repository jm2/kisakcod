name: Licensed gameplay smoke

# DEFERRED. Do not dispatch this workflow.
#
# It is manual-only and protected because it executes repository code on a
# self-hosted runner that has licensed COD4 data. That infrastructure does not
# currently exist: no self-hosted runners are registered and the
# KISAKCOD_GAME_DIR secret is not set. Licensed-data testing is not a current
# priority.
#
# Without the `preflight` gate below, a dispatch does not fail -- it QUEUES on a
# runner that will never come online, sits in the run list for 24 hours, and is
# then killed by GitHub's self-hosted job queue limit without executing a single
# step. Preflight runs on a hosted runner and fails in seconds with an actionable
# message instead. It does not block a properly provisioned run: once a runner is
# registered and the secret exists, preflight passes and the smoke proceeds.
on:
  workflow_dispatch:
    inputs:
      infrastructure_ready:
        description: >-
          Type "yes" ONLY if a [self-hosted, kisakcod, windows, x86] runner is registered AND online.
          Leave as "no" otherwise: the smoke is deferred, and an unguarded dispatch does not fail, it
          queues for 24 hours against a runner that does not exist.
        required: true
        default: "no"
        type: string

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (licensed infrastructure)
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: licensed-game-data
    steps:
      # A workflow cannot verify runner availability itself: listing self-hosted
      # runners needs the "Administration: read" permission, which is not one of
      # the permissions grantable to GITHUB_TOKEN. `timeout-minutes` does not help
      # either -- it only starts counting once a job begins executing, whereas the
      # failure mode here is the job never starting at all. So the runner half of
      # the check has to be an explicit human assertion at dispatch time.
      - name: Require an explicit infrastructure acknowledgement
        env:
          READY: ${{ inputs.infrastructure_ready }}
        run: |
          if [ "$READY" != "yes" ]; then
            echo "::error title=Licensed gameplay smoke is deferred::Dispatched without confirming the self-hosted runner is online."
            echo "This workflow is DEFERRED and should not be dispatched."
            echo ""
            echo "It requires all of the following:"
            echo "  1. a self-hosted runner labelled [self-hosted, kisakcod, windows, x86], ONLINE"
            echo "  2. the KISAKCOD_GAME_DIR secret, pointing at licensed COD4 data"
            echo "  3. protection rules on the 'licensed-game-data' environment"
            echo ""
            echo "As of the last check, none of the three existed."
            echo ""
            echo "If you have genuinely provisioned the runner, re-dispatch with"
            echo "infrastructure_ready=yes. Otherwise do not re-dispatch: the self-hosted jobs"
            echo "would sit queued for 24 hours and then be killed without running a step."
            exit 1
          fi
          echo "Runner availability acknowledged by the dispatcher."

      - name: Require the licensed-data secret
        env:
          GAME_DIR: ${{ secrets.KISAKCOD_GAME_DIR }}
        run: |
          if [ -z "$GAME_DIR" ]; then
            echo "::error title=KISAKCOD_GAME_DIR is not set::The smoke cannot run without licensed game data."
            echo "infrastructure_ready=yes was passed, but the KISAKCOD_GAME_DIR secret does not exist"
            echo "at repository or 'licensed-game-data' environment scope. Add it before dispatching."
            exit 1
          fi
          echo "KISAKCOD_GAME_DIR is configured. Proceeding to the self-hosted smoke jobs."

  windows-x86:
    name: Windows x86 legacy dedicated
    needs: preflight
    if: github.ref == 'refs/heads/master'
    environment: licensed-game-data
    runs-on: [self-hosted, kisakcod, windows, x86]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build dedicated server
        shell: pwsh
        run: ./build-win.ps1 -Config Release -Targets KisakCOD-dedi -Clean

      - name: Start server and query getstatus
        shell: pwsh
        env:
          KISAKCOD_GAME_DIR: ${{ secrets.KISAKCOD_GAME_DIR }}
        run: ./scripts/ci/smoke-dedicated.ps1 -Executable ./bin/Release/KisakCOD-dedi.exe

  windows-x86-headless:
    name: Windows x86 headless dedicated
    needs: preflight
    if: github.ref == 'refs/heads/master'
    environment: licensed-game-data
    runs-on: [self-hosted, kisakcod, windows, x86]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build headless dedicated server
        shell: pwsh
        run: >
          ./build-win.ps1 -Config Release -Targets KisakCOD-dedi
          -HeadlessDedi -BuildDir build-headless -Clean

      - name: Start headless server and query getstatus
        shell: pwsh
        env:
          KISAKCOD_GAME_DIR: ${{ secrets.KISAKCOD_GAME_DIR }}
        run: >
          ./scripts/ci/smoke-dedicated.ps1
          -Executable ./bin/Release/KisakCOD-dedi.exe -Port 28962
