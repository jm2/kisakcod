name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true

permissions:
  contents: write

jobs:
  windows-x86:
    runs-on: windows-2022
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      DXSDK_VERSION: 9.29.952.8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore DirectX SDK
        shell: pwsh
        run: |
          dotnet new classlib -o dxsdk-temp
          dotnet add dxsdk-temp package Microsoft.DXSDK.D3DX --version $env:DXSDK_VERSION
          $native = Join-Path $env:NUGET_PACKAGES "microsoft.dxsdk.d3dx\$env:DXSDK_VERSION\build\native"
          "DXSDK_NATIVE=$native" >> $env:GITHUB_ENV

      - name: Configure and build
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A Win32 `
            -DCICD=ON "-DDXSDK_DIR=$env:DXSDK_NATIVE" `
            -DKISAK_BUILD_MP=ON -DKISAK_BUILD_DEDICATED=ON -DKISAK_BUILD_SP=OFF
          cmake --build build --config Release --target KisakCOD-mp KisakCOD-dedi --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path bin/Release/* -DestinationPath dist/KisakCOD-windows-x86.zip
          $hash = (Get-FileHash dist/KisakCOD-windows-x86.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  KisakCOD-windows-x86.zip" | Set-Content -NoNewline dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/KisakCOD-windows-x86.zip
            dist/SHA256SUMS.txt
